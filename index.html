<!DOCTYPE html>

<title>春游 2026 · 行程规划</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#F4EFE6;--card:#FDFAF5;--text:#1E1A14;--text2:#7A7060;--border:rgba(30,26,20,.1);
  --green:#4A7C59;--green-light:#EAF2EC;
  --c1:#C97B4B;--c2:#7B5EBF;--c3:#3D9090;--c4:#B8982A;--c5:#4E8C4A;--c6:#3D6E9E;--c7:#A04848;
}
html,body{height:100%;font-family:-apple-system,'PingFang SC','Hiragino Sans GB',sans-serif;background:var(--bg);color:var(--text)}
.app{display:flex;flex-direction:column;height:100vh;max-width:480px;margin:0 auto;position:relative}

/* Header */
.hdr{background:var(--bg);border-bottom:1px solid var(--border);padding:12px 16px 0;flex-shrink:0;position:sticky;top:0;z-index:50}
.hdr-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.hdr-title{font-size:17px;font-weight:700;letter-spacing:.01em}
.hdr-sub{font-size:11px;color:var(--text2);margin-top:1px}
.day-pills{display:flex;background:rgba(0,0,0,.07);border-radius:8px;padding:2px;gap:2px}
.day-pill{padding:4px 14px;border-radius:6px;border:none;background:transparent;font-size:13px;font-weight:500;color:var(--text2);cursor:pointer;transition:all .15s}
.day-pill.on{background:var(--card);color:var(--text);box-shadow:0 1px 4px rgba(0,0,0,.12)}
.chips{display:flex;gap:5px;overflow-x:auto;padding-bottom:10px;scrollbar-width:none}
.chips::-webkit-scrollbar{display:none}
.chip{flex-shrink:0;padding:4px 11px;border-radius:20px;border:1.5px solid;font-size:11px;font-weight:500;cursor:pointer;transition:all .12s;white-space:nowrap}

/* Scroll area */
.scroll{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch}

/* Time group */
.tg{padding:0 14px}
.tlabel{font-size:11px;font-weight:700;color:var(--text2);padding:14px 2px 6px;letter-spacing:.06em;display:flex;align-items:center;gap:6px}
.tlabel::after{content:'';flex:1;height:.5px;background:var(--border)}

/* Act card */
.act{display:flex;align-items:center;gap:10px;padding:9px 11px;background:var(--card);border-radius:10px;margin-bottom:5px;cursor:pointer;border:1.5px solid transparent;transition:all .12s;position:relative;overflow:hidden}
.act::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--sc);border-radius:3px 0 0 3px;opacity:0;transition:opacity .15s}
.act.on::before{opacity:1}
.act.on{border-color:var(--sc);background:#fff}
.act:active{transform:scale(.98)}
.dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;background:var(--sc)}
.ai{flex:1;min-width:0}
.aname{font-size:13.5px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.3}
.ameta{display:flex;align-items:center;gap:5px;margin-top:3px;flex-wrap:wrap}
.atime{font-size:11px;color:var(--text2)}
.sbadge{font-size:9.5px;padding:1px 6px;border-radius:4px;font-weight:500}
.cwarn{font-size:9.5px;color:#A05020;background:#FEF0E4;border-radius:4px;padding:1px 5px}
.star{font-size:17px;line-height:1;color:var(--text2);padding:4px;flex-shrink:0;transition:all .12s}
.act.on .star{color:var(--sc)}

/* Detail modal */
.modal{position:fixed;inset:0;background:rgba(0,0,0,.35);display:none;align-items:flex-end;justify-content:center;z-index:1000}
.modal.on{display:flex}
.sheet{width:min(520px,100%);background:var(--card);border-radius:14px 14px 0 0;border:1px solid var(--border);box-shadow:0 -10px 30px rgba(0,0,0,.18);max-height:78vh;overflow:auto;-webkit-overflow-scrolling:touch}
.sheet-h{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;padding:14px 16px;border-bottom:1px solid var(--border)}
.sheet-title{font-size:16px;font-weight:800}
.sheet-sub{font-size:11px;color:var(--text2);margin-top:3px}
.sheet-x{font-size:18px;line-height:1;background:none;border:none;color:var(--text2);padding:4px 6px;cursor:pointer}
.sheet-b{padding:14px 16px 18px}
.p{font-size:13px;line-height:1.7;color:var(--text)}
.links{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px}
.link{display:inline-flex;align-items:center;gap:6px;padding:7px 10px;border-radius:999px;border:1px solid var(--border);background:#fff;color:var(--text);font-size:12px;text-decoration:none}
.audio{margin-top:12px}
.audio audio{width:100%}

/* My plan */
.plan-empty{text-align:center;padding:70px 24px;color:var(--text2)}
.plan-empty-icon{font-size:44px;margin-bottom:14px;opacity:.7}
.plan-empty-txt{font-size:14px;line-height:1.7}
.plan-day-hdr{font-size:11px;font-weight:700;color:var(--text2);padding:14px 16px 6px;letter-spacing:.06em;display:flex;align-items:center;gap:6px}
.plan-day-hdr::after{content:'';flex:1;height:.5px;background:var(--border)}
.pi{display:flex;align-items:flex-start;gap:12px;padding:10px 16px;border-bottom:.5px solid var(--border)}
.pi-time{min-width:82px;flex-shrink:0}
.pi-h{font-size:15px;font-weight:700}
.pi-end{font-size:10px;color:var(--text2);margin-top:1px}
.pi-info{flex:1;min-width:0}
.pi-name{font-size:13.5px;font-weight:600;line-height:1.3}
.pi-stage{font-size:11px;font-weight:500;margin-top:2px}
.pi-warn{font-size:10px;color:#A05020;background:#FEF0E4;border-radius:4px;padding:2px 7px;margin-top:5px;display:inline-block}
.pi-del{font-size:16px;padding:4px;cursor:pointer;color:var(--text2);flex-shrink:0;margin-top:2px}

/* Plan header bar */
.plan-hdr{background:var(--bg);padding:10px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.plan-hdr-title{font-size:14px;font-weight:600}
.plan-summary{font-size:12px;color:var(--text2)}

/* Bottom nav */
.bnav{display:flex;background:var(--bg);border-top:1px solid var(--border);flex-shrink:0;padding-bottom:env(safe-area-inset-bottom,0)}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:8px 0;background:none;border:none;cursor:pointer;position:relative}
.ni{font-size:20px}
.nl{font-size:10px;color:var(--text2);transition:color .15s}
.nb.on .nl{color:var(--green);font-weight:600}
.nbadge{background:var(--green);color:#fff;font-size:9px;font-weight:700;padding:1px 5px;border-radius:8px;position:absolute;top:3px;right:calc(50% - 26px)}

/* Tab panels */
.panel{display:none;flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.panel.on{display:block}

/* Toast */
.toast{position:fixed;bottom:72px;left:50%;transform:translateX(-50%);background:rgba(30,26,20,.85);color:#fff;font-size:13px;padding:8px 16px;border-radius:20px;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;z-index:999}
.toast.show{opacity:1}
</style>
</head>

</div>

</div>

const ARTIST_INFO={
  // '沉默橙': {intro:'一段简介...', links:[{t:'听歌',u:'https://...'}]},
};

function loadPlanFromStorage(){
  try{
    const raw=localStorage.getItem(PLAN_STORAGE_KEY);
    if(!raw)return;
    const arr=JSON.parse(raw);
    if(!Array.isArray(arr))return;
    arr.forEach(k=>{if(typeof k==='string'&&k.includes('|'))ST.add(k)});
  }catch(e){}
}
function savePlanToStorage(){
  try{
    localStorage.setItem(PLAN_STORAGE_KEY,JSON.stringify([...ST]));
  }catch(e){}
}

function pt(t){const[h,m]=t.split(':').map(Number);return(h<13?h+24:h)*60+m}
function sg(id){return STAGES.find(s=>s.id===id)}
function key(d,n){return d+'|'+n}

function conflictsForDay(d){
  const c=new Set();
  const arr=[...ST].filter(k=>k.startsWith(d+'|')).map(k=>D[d].find(a=>key(d,a.n)===k)).filter(Boolean);
  for(let i=0;i<arr.length;i++)for(let j=i+1;j<arr.length;j++){
    const a=arr[i],b=arr[j];
    if(a.g===b.g)continue;
    const as=pt(a.s),ae=pt(a.e),bs=pt(b.s),be=pt(b.e);
    if(as<be&&ae>bs){c.add(a.n);c.add(b.n)}
  }
  return c;
}

function conflicts(){
  return conflictsForDay(day);
}

function renderChips(){
  const el=document.getElementById('chips');
  const all=stg==='all';
  let h=`<button class="chip" style="border-color:${all?'var(--text)':'var(--border)'};color:${all?'#fff':'var(--text2)'};background:${all?'var(--text)':'transparent'}" onclick="setStg('all')">全部</button>`;
  STAGES.forEach(s=>{
    const on=stg===s.id;
    h+=`<button class="chip" style="border-color:${s.c};color:${on?'#fff':s.c};background:${on?s.c:'transparent'}" onclick="setStg('${s.id}')">${s.n.replace('舞台','').replace('空间','')}</button>`;
  });
  el.innerHTML=h;
}

function renderAll(){
  const cf=conflicts();
  const acts=D[day].filter(a=>stg==='all'||a.g===stg).sort((a,b)=>pt(a.s)-pt(b.s));
  const grps={};
  acts.forEach(a=>{
    const h=parseInt(a.s);
    const dh=h<13?h+24:h;
    if(!grps[dh])grps[dh]=[];
    grps[dh].push(a);
  });
  let html='';
  Object.keys(grps).sort((a,b)=>+a-+b).forEach(h=>{
    const label=h>=24?`0${h-24}`.slice(-2)+':00':`${String(h).padStart(2,'0')}:00`;
    html+=`<div class="tg"><div class="tlabel">${label}</div>`;
    grps[h].forEach(a=>{
      const s=sg(a.g);const on=ST.has(key(day,a.n));const isC=cf.has(a.n);
      const esc=a.n.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
      html+=`<div class="act${on?' on':''}" style="--sc:${s.c}" onclick="openDetail(${day},'${esc}')">
        <div class="dot"></div>
        <div class="ai">
          <div class="aname">${a.n}</div>
          <div class="ameta">
            <span class="atime">${a.s}–${a.e}</span>
            <span class="sbadge" style="background:${s.c}22;color:${s.c}">${s.n}</span>
            ${isC?'<span class="cwarn">⚠ 冲突</span>':''}
          </div>
        </div>
        <div class="star" onclick="event.stopPropagation(); tog(${day},'${esc}')">${on?'★':'☆'}</div>
      </div>`;
    });
    html+='</div>';
  });
  document.getElementById('allList').innerHTML=html||'<div style="padding:40px;text-align:center;color:var(--text2);font-size:14px">暂无演出</div>';
}

function renderPlan(){
  const cf1=conflictsForDay(1);
  const cf2=conflictsForDay(2);
  const d1Acts=D[1].filter(a=>ST.has(key(1,a.n))).map(a=>({...a,day:1})).sort((a,b)=>pt(a.s)-pt(b.s));
  const d2Acts=D[2].filter(a=>ST.has(key(2,a.n))).map(a=>({...a,day:2})).sort((a,b)=>pt(a.s)-pt(b.s));
  const total=d1Acts.length+d2Acts.length;

  if(!total){
    document.getElementById('planList').innerHTML=`<div class="plan-empty"><div class="plan-empty-icon">🌱</div><div class="plan-empty-txt">还没有收藏任何演出<br>去列表点击 ☆ 添加</div></div>`;
    document.getElementById('planSummary').textContent='';
    return;
  }
  document.getElementById('planSummary').textContent=`Day1 ${d1Acts.length} 场 · Day2 ${d2Acts.length} 场 · 共 ${total} 场`;

  function renderDaySection(list, dayNum, cf){
    if(!list.length)return '';
    let html=`<div class="plan-day-hdr">4月${dayNum===1?'11':'12'}日 Day ${dayNum}</div>`;
    list.forEach(a=>{
      const s=sg(a.g);
      const isC=cf.has(a.n);
      const esc=a.n.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
      html+=`<div class="pi">
        <div class="pi-time"><div class="pi-h">${a.s}</div><div class="pi-end">结束 ${a.e}</div></div>
        <div class="pi-info">
          <div class="pi-name">${a.n}</div>
          <div class="pi-stage" style="color:${s.c}">${s.n}</div>
          ${isC?'<div class="pi-warn">⚠ 与其他收藏时间重叠</div>':''}
        </div>
        <div class="pi-del" onclick="tog(${dayNum},'${esc}')">✕</div>
      </div>`;
    });
    return html;
  }

  let html='';
  html += renderDaySection(d1Acts, 1, cf1);
  html += renderDaySection(d2Acts, 2, cf2);
  document.getElementById('planList').innerHTML=html;
}

function updateBadge(){
  const n=[...ST].filter(k=>k.startsWith(day+'|')).length;
  const b=document.getElementById('nbadge');
  b.style.display=n?'block':'none';
  b.textContent=n;
}

function tog(d,n){
  const k=key(d,n);
  const adding=!ST.has(k);
  if(adding)ST.add(k);else ST.delete(k);
  savePlanToStorage();
  renderAll();renderPlan();updateBadge();
  showToast(adding?`已添加到行程 ★`:`已从行程移除`);
}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),1800);
}

function setDay(d){
  day=d;
  document.querySelectorAll('.day-pill').forEach((b,i)=>b.classList.toggle('on',i+1===d));
  renderAll();updateBadge();
  if(tab==='plan')renderPlan();
  document.getElementById('panelAll').scrollTop=0;
}

function setTab(t){
  tab=t;
  document.getElementById('panelAll').classList.toggle('on',t==='all');
  document.getElementById('panelPlan').classList.toggle('on',t==='plan');
  document.getElementById('nb1').classList.toggle('on',t==='all');
  document.getElementById('nb2').classList.toggle('on',t==='plan');
  if(t==='plan')renderPlan();
}

function setStg(s){stg=s;renderChips();renderAll()}

function openDetail(d,name){
  const a=D[d].find(x=>x.n===name);
  const s=a?sg(a.g):null;
  const info=ARTIST_INFO[name]||{};
  document.getElementById('mTitle').textContent=name;
  document.getElementById('mSub').textContent=a?`Day${d} · ${a.s}–${a.e} · ${s?s.n:''}`:'';
  document.getElementById('mIntro').textContent=info.intro||'暂无介绍。你可以把这个艺人的简介/试听链接发我，我帮你补进去。';

  const linksEl=document.getElementById('mLinks');
  const links=Array.isArray(info.links)?info.links:[];
  linksEl.innerHTML=links.map(l=>`<a class="link" href="${l.u}" target="_blank" rel="noopener">${l.t}</a>`).join('') || '';

  const audioEl=document.getElementById('mAudio');
  if(info.audio && info.audio.src){
    audioEl.style.display='block';
    const t=info.audio.type||'audio/mpeg';
    audioEl.innerHTML=`<audio controls preload="none"><source src="${info.audio.src}" type="${t}"></audio>`;
  }else{
    audioEl.style.display='none';
    audioEl.innerHTML='';
  }

  document.getElementById('modal').classList.add('on');
}
function closeModal(){
  const m=document.getElementById('modal');
  if(!m)return;
  m.classList.remove('on');
}

loadPlanFromStorage();
renderChips();renderAll();updateBadge();
</script>
</body>
</html>
